<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Diana – Logowanie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #070b13;
            color: #e8eef8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* animated background glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 60% at 20% 10%, rgba(59, 130, 246, .12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139, 92, 246, .10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(6, 182, 212, .06) 0%, transparent 70%);
        }

        /* floating DNA particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .p {
            position: absolute;
            font-size: 1.5rem;
            animation: float linear infinite;
            opacity: .08;
        }

        .p:nth-child(1) {
            left: 10%;
            top: 20%;
            animation-duration: 18s;
            animation-delay: -3s;
        }

        .p:nth-child(2) {
            left: 80%;
            top: 10%;
            animation-duration: 22s;
            animation-delay: -7s;
        }

        .p:nth-child(3) {
            left: 50%;
            top: 70%;
            animation-duration: 15s;
            animation-delay: -1s;
        }

        .p:nth-child(4) {
            left: 30%;
            top: 80%;
            animation-duration: 20s;
            animation-delay: -5s;
        }

        .p:nth-child(5) {
            left: 70%;
            top: 50%;
            animation-duration: 25s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-40px) rotate(180deg);
            }

            100% {
                transform: translateY(0px) rotate(360deg);
            }
        }

        /* LOGIN CARD */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(17, 28, 46, 0.92);
            border: 1px solid #1a2d47;
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .5), 0 0 0 1px rgba(59, 130, 246, .08);
            backdrop-filter: blur(24px);
            animation: cardIn .6s cubic-bezier(.22, 1, .36, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(.97);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 24px 24px 0 0;
            background: linear-gradient(90deg, #3b82f6, #06b6d4, #8b5cf6);
        }

        .icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bob 4s ease-in-out infinite;
            display: block;
        }

        @keyframes bob {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(130deg, #60a5fa, #34d399, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #4a6480;
            font-size: .85rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: #5a7a9a;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid #1a2d47;
            border-radius: 12px;
            color: #e8eef8;
            font-family: 'JetBrains Mono', monospace;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="password"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
        }

        input[type="password"]::placeholder {
            color: #2d4a66;
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #4a6480;
            font-size: 1.1rem;
            padding: 4px;
            line-height: 1;
            transition: color .2s;
        }

        .eye-btn:hover {
            color: #8da5c4;
        }

        .error-msg {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .3);
            border-radius: 10px;
            padding: 12px 14px;
            color: #fca5a5;
            font-size: .85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 6px 24px rgba(59, 130, 246, .35);
        }

        .btn-login:hover {
            opacity: .92;
            transform: translateY(-1px);
            box-shadow: 0 10px 32px rgba(59, 130, 246, .45);
        }

        .btn-login:active {
            transform: none;
        }

        .dna-label {
            text-align: center;
            margin-top: 24px;
            color: #2d4a66;
            font-size: .75rem;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body>
    <div class="particles">
        <span class="p">🧬</span><span class="p">🔬</span><span class="p">🧪</span>
        <span class="p">📊</span><span class="p">🔭</span>
    </div>

    <div class="card">
        <span class="icon">🔐</span>
        <h1>Dane Diana</h1>
        <p class="subtitle">Selekcja Genów – Wyniki Eksperymentów</p>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
            <div class="form-group">
                <label for="password">Hasło dostępu</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="Wprowadź hasło..."
                        autocomplete="current-password" autofocus>
                    <button type="button" class="eye-btn" onclick="togglePwd()" title="Pokaż/ukryj hasło">👁</button>
                </div>
            </div>
            <button type="submit" class="btn-login">Zaloguj się →</button>
        </form>

        <p class="dna-label">🧬 Diana Gene Selection · 2026</p>
    </div>

    <script>
        function togglePwd() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }
        // Submit on Enter
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') e.target.closest('form').submit();
        });
    </script>
</body>

</html>
